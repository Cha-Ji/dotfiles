# ─── Prefix 키 변경 (Ctrl+B → Ctrl+A) ───
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── 기본 설정 ───
set -g default-shell /usr/bin/zsh
set -g mouse on
set-environment -g -u CLAUDECODE
set-environment -g -u CLAUDE_CODE_ENTRYPOINT
set -g base-index 1
setw -g pane-base-index 1
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ─── 패널 분할 ───
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ─── vim 스타일 패널 이동 (prefix 불필요) ───
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ─── 패널 리사이즈 (prefix 불필요) ───
bind -n M-Left resize-pane -L 3
bind -n M-Right resize-pane -R 3
bind -n M-Up resize-pane -U 3
bind -n M-Down resize-pane -D 3

# ─── 복사 모드 (vim 스타일) ───
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection

# ─── 클립보드: 플랫폼 자동 감지 ───
# Wayland (Arch Linux / native Linux)
if-shell 'command -v wl-copy > /dev/null 2>&1' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"; \
     unbind -T copy-mode-vi MouseDragEnd1Pane; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"; \
     bind p run-shell "wl-paste | tmux load-buffer - && tmux paste-buffer"'

# WSL (Windows clipboard)
if-shell 'command -v clip.exe > /dev/null 2>&1 && ! command -v wl-copy > /dev/null 2>&1' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"; \
     unbind -T copy-mode-vi MouseDragEnd1Pane; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"; \
     bind p run-shell "powershell.exe -Command Get-Clipboard | tmux load-buffer - && tmux paste-buffer"'

# macOS (pbcopy)
if-shell 'command -v pbcopy > /dev/null 2>&1' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"; \
     unbind -T copy-mode-vi MouseDragEnd1Pane; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"; \
     bind p run-shell "pbpaste | tmux load-buffer - && tmux paste-buffer"'

# ─── 활동 감지 알림 ───
setw -g monitor-activity on
set -g visual-activity on

# ─── 윈도우 이름 자동 변경 비활성화 ───
set -g allow-rename off
setw -g automatic-rename off

# ─── One Dark 상태바 ───
set -g status-bg '#282C34'
set -g status-fg '#ABB2BF'
set -g window-status-format '#[fg=#5C6370] #I:#W '
set -g window-status-current-format '#[fg=#282C34,bg=#61AFEF,bold] #I:#W '
set -g status-left '[#S] '
set -g status-left-length 30
set -g status-right '#[fg=#5C6370]%m/%d %H:%M'
set -g status-right-length 20

# ─── yazi 팝업 (이미지/PDF 프리뷰용) ───
bind-key -n M-y display-popup -E -w 80% -h 80% "yazi"

# ─── 플러그인 (세션 복원) ───
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tpm 초기화 (반드시 맨 마지막)
run '~/.tmux/plugins/tpm/tpm'
