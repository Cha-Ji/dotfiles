font_family MesloLGS Nerd Font
font_size 12
shell /usr/bin/zsh

# ── macOS-style copy/paste (keyd remaps Super+C/V -> Ctrl+C/V) ──
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard

# ── One Dark color scheme ──
foreground #ABB2BF
background #282C34
cursor #528BFF
selection_foreground #282C34
selection_background #979EAB

color0  #3F4451
color1  #E06C75
color2  #98C379
color3  #E5C07B
color4  #61AFEF
color5  #C678DD
color6  #56B6C2
color7  #ABB2BF
color8  #5C6370
color9  #E06C75
color10 #98C379
color11 #E5C07B
color12 #61AFEF
color13 #C678DD
color14 #56B6C2
color15 #ECEFF4

# ── Transparency / Blur (Hyprland handles blur) ──
background_opacity 0.92

# ── Tab bar ──
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom
active_tab_foreground   #282C34
active_tab_background   #61AFEF
active_tab_font_style   bold
inactive_tab_foreground  #5C6370
inactive_tab_background  #3F4451

# ── Tab keybindings ──
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+left previous_tab
map ctrl+shift+right next_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5

# ── Window split keybindings ──
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# ── Scrollback ──
scrollback_lines 10000

# ── Misc ──
enable_audio_bell no
confirm_os_window_close 0
window_padding_width 4
